<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Shell Host - E2E Test</title>
</head>
<body>
  <div id="status">loading</div>
  <script type="module">
    import { createShellBridge, originRegistry } from '@napplet/shell';

    const windowId = 'test-napp-1';
    let relay;
    window.__TEST__ = {
      get authCompleted() { return relay.runtime.sessionRegistry.isRegistered(windowId); },
      errors: [],
    };

    try {
      // Create mock hooks with real crypto verification
      const hooks = {
        crypto: {
          async verifyEvent(event) {
            const { verifyEvent } = await import('nostr-tools/pure');
            return verifyEvent(event);
          },
        },
        relayPool: {
          getRelayPool: () => null,
          trackSubscription: () => {},
          untrackSubscription: () => {},
          openScopedRelay: () => {},
          closeScopedRelay: () => {},
          publishToScopedRelay: () => false,
          selectRelayTier: () => [],
        },
        relayConfig: {
          addRelay: () => {},
          removeRelay: () => {},
          getRelayConfig: () => ({ discovery: [], super: [], outbox: [] }),
          getNip66Suggestions: () => [],
        },
        windowManager: {
          createWindow: () => null,
        },
        auth: {
          getUserPubkey: () => null,
          getSigner: () => null,
        },
        config: {
          getNappUpdateBehavior: () => 'auto-grant',
        },
        hotkeys: {
          executeHotkeyFromForward: () => {},
        },
        workerRelay: {
          getWorkerRelay: () => null,
        },
      };

      relay = createShellBridge(hooks);

      // Listen for messages from the iframe and route to pseudo-relay
      window.addEventListener('message', (event) => {
        try {
          relay.handleMessage(event);
        } catch (err) {
          window.__TEST__.errors.push(String(err));
        }
      });

      // Create sandboxed iframe
      const iframe = document.createElement('iframe');
      iframe.id = 'test-napplet';
      iframe.sandbox.add('allow-scripts');
      iframe.src = '/test-napplet.html';

      iframe.addEventListener('load', () => {
        // Register the iframe's contentWindow in the origin registry
        originRegistry.register(iframe.contentWindow, windowId);

        // Send AUTH challenge to the napplet
        relay.sendChallenge(windowId);
        document.getElementById('status').textContent = 'challenge-sent';
      });

      document.body.appendChild(iframe);

    } catch (err) {
      window.__TEST__.errors.push(String(err));
      document.getElementById('status').textContent = 'error: ' + err;
    }
  </script>
</body>
</html>
