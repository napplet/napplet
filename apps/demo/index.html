<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>napplet playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="bg-surface-dark text-gray-300 font-mono min-h-screen flex flex-col overflow-hidden">
  <!-- Header -->
  <header class="px-4 py-2 bg-surface-mid border-b border-surface-border flex items-center shrink-0">
    <h1 class="text-neon-blue text-sm font-bold tracking-wider uppercase">napplet playground</h1>
  </header>

  <!-- Top: Visual flow — Chat | lines | ACL/Shell | lines | Bot -->
  <section id="flow-area" class="shrink-0 px-4 py-3">
    <div class="flex items-stretch gap-0 h-[280px]">

      <!-- Chat napplet box -->
      <div id="chat-box" class="flex flex-col w-[300px] min-w-[240px] border-2 border-surface-border rounded-lg overflow-hidden transition-colors duration-300">
        <div class="px-3 py-1.5 bg-surface-mid border-b border-surface-border flex items-center justify-between shrink-0">
          <span class="text-neon-blue text-xs font-bold">chat</span>
          <span id="chat-status" class="text-[10px] text-gray-500">loading...</span>
        </div>
        <div id="chat-acl" class="px-2 py-1 bg-surface-dark border-b border-surface-border shrink-0"></div>
        <div id="chat-frame-container" class="flex-1 relative min-h-0"></div>
      </div>

      <!-- Connecting lines: Chat → Shell -->
      <div class="flex flex-col justify-center w-[40px] shrink-0">
        <div class="flex flex-col items-center gap-1">
          <div id="line-chat-out" class="w-full h-[2px] bg-surface-border transition-colors duration-300"></div>
          <span class="text-[8px] text-gray-600">→</span>
          <div id="line-chat-in" class="w-full h-[2px] bg-surface-border transition-colors duration-300"></div>
          <span class="text-[8px] text-gray-600">←</span>
        </div>
      </div>

      <!-- ACL / Shell box (center) -->
      <div id="shell-box" class="flex flex-col w-[200px] min-w-[160px] border-2 border-surface-border rounded-lg overflow-hidden transition-colors duration-300">
        <div class="px-3 py-1.5 bg-surface-mid border-b border-surface-border shrink-0">
          <span class="text-neon-purple text-xs font-bold">shell / acl</span>
        </div>
        <div class="flex-1 flex flex-col p-2 gap-2 overflow-y-auto">
          <div id="shell-info" class="text-[10px] text-gray-500">
            <div>relay: <span class="text-neon-blue">shell://</span></div>
            <div id="shell-pubkey" class="truncate">pubkey: ...</div>
          </div>
          <div class="border-t border-surface-border pt-2">
            <div class="text-[10px] text-gray-400 mb-1 font-semibold">Message Flow</div>
            <div id="shell-flow-log" class="text-[9px] text-gray-600 space-y-0.5 max-h-[160px] overflow-y-auto"></div>
          </div>
        </div>
      </div>

      <!-- Connecting lines: Shell → Bot -->
      <div class="flex flex-col justify-center w-[40px] shrink-0">
        <div class="flex flex-col items-center gap-1">
          <div id="line-bot-in" class="w-full h-[2px] bg-surface-border transition-colors duration-300"></div>
          <span class="text-[8px] text-gray-600">→</span>
          <div id="line-bot-out" class="w-full h-[2px] bg-surface-border transition-colors duration-300"></div>
          <span class="text-[8px] text-gray-600">←</span>
        </div>
      </div>

      <!-- Bot napplet box -->
      <div id="bot-box" class="flex flex-col w-[300px] min-w-[240px] border-2 border-surface-border rounded-lg overflow-hidden transition-colors duration-300">
        <div class="px-3 py-1.5 bg-surface-mid border-b border-surface-border flex items-center justify-between shrink-0">
          <span class="text-neon-pink text-xs font-bold">bot</span>
          <span id="bot-status" class="text-[10px] text-gray-500">loading...</span>
        </div>
        <div id="bot-acl" class="px-2 py-1 bg-surface-dark border-b border-surface-border shrink-0"></div>
        <div id="bot-frame-container" class="flex-1 relative min-h-0"></div>
      </div>

    </div>
  </section>

  <!-- Bottom: Protocol debugger (live log + sequence) -->
  <section class="flex-1 flex flex-col min-h-0 border-t border-surface-border">
    <napplet-debugger id="debugger"></napplet-debugger>
  </section>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
