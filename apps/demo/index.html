<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>napplet playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .node-box { border: 3px solid #3a3a4a; transition: border-color 0.3s, box-shadow 0.3s; }
    .node-box.active { border-color: #39ff14; box-shadow: 0 0 12px #39ff1430; }
    .node-box.blocked { border-color: #ff3b3b; box-shadow: 0 0 12px #ff3b3b30; }
    .node-box.amber { border-color: #ff9f0a; box-shadow: 0 0 12px #ff9f0a30; }
    /* .topology-edge CSS bar rules removed — edges now rendered by Leader Line (SVG) */
    .acl-btn { transition: all 0.15s; }
    .acl-btn-on { background: rgba(57,255,20,0.2); border-color: rgba(57,255,20,0.5); color: #39ff14; }
    .acl-btn-off { background: rgba(255,59,59,0.2); border-color: rgba(255,59,59,0.5); color: #ff3b3b; }
    .acl-btn-block { background: transparent; border-color: #3a3a4a; color: #666; }
    .acl-btn-block:hover { border-color: rgba(255,59,59,0.4); color: #ff3b3b; }
    .acl-btn-blocked { background: rgba(255,59,59,0.2); border-color: rgba(255,59,59,0.5); color: #ff3b3b; }
    .topology-layout { height: 100%; display: flex; flex-direction: column; gap: 12px; position: relative; }
    .topology-region { display: flex; flex-direction: column; gap: 10px; }
    .topology-region-label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #7c86a7; }
    .topology-napplet-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; min-height: 0; }
    .topology-napplet-branch { display: flex; flex-direction: column; gap: 8px; }
    .topology-service-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
    .topology-service-branch { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 180px; }
    .topology-layer { display: flex; justify-content: center; }
    .topology-node { background: linear-gradient(180deg, rgba(18,18,26,0.95), rgba(10,10,15,0.98)); border-radius: 16px; overflow: hidden; }
    .topology-node-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px 0; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #7981a0; }
    .topology-node-kicker { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #7981a0; }
    .topology-node-status { font-size: 10px; color: #666; }
    .topology-node-title { padding: 2px 14px 0; font-size: 18px; line-height: 1.2; color: #f0f6ff; text-transform: lowercase; }
    .topology-node-copy { padding: 6px 14px 12px; font-size: 11px; line-height: 1.5; color: #a5abc2; }
    .topology-node-meta { padding: 0 14px 14px; font-size: 11px; color: #62d0ff; }
    .topology-core-card { width: min(100%, 420px); }
    .topology-napplet-card { min-height: 260px; display: flex; flex-direction: column; }
    .topology-service-card { width: 100%; max-width: 220px; }
    .topology-acl-slot { padding: 10px 14px; border-top: 1px solid #1f2235; border-bottom: 1px solid #1f2235; min-height: 58px; background: rgba(255,255,255,0.01); }
    .topology-frame-slot { flex: 1; min-height: 220px; position: relative; }
    .topology-services-region { padding-bottom: 4px; }
    .topology-flow-log { margin: 0 14px 14px; padding-top: 10px; border-top: 1px solid #1f2235; }
    .topology-flow-log-label { margin-bottom: 6px; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #7c86a7; }
    .topology-flow-log-body { font-size: 10px; color: #666; min-height: 20px; }
    /* Node compact summary */
    .node-summary { display: flex; flex-wrap: wrap; gap: 4px 10px; padding: 6px 14px 8px; border-top: 1px solid #1f2235; }
    .node-summary-field { font-size: 10px; color: #a5abc2; }
    .node-summary-label { color: #7981a0; letter-spacing: 0.1em; text-transform: uppercase; }
    .node-summary-value { color: #d0d4e8; }
    /* Two-pane workspace: topology left, inspector right */
    #flow-area-inner { display: flex; height: 100%; gap: 0; min-height: 0; }
    #topology-pane { flex: 1; min-width: 0; overflow: auto; padding: 4px; }
    #inspector-pane {
      width: 0; overflow: hidden; transition: width 0.22s ease;
      background: linear-gradient(180deg, rgba(18,18,26,0.98), rgba(10,10,15,0.99));
      border-left: 1px solid #1f2235; font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: #a5abc2; flex-shrink: 0;
    }
    #flow-area-inner.inspector-open #inspector-pane { width: 280px; overflow: hidden; }
    /* Selected node highlight */
    .node-box.inspector-selected { border-color: #00f0ff; box-shadow: 0 0 12px #00f0ff30; }
    /* Node click affordance */
    [data-node-id] { cursor: pointer; }
    /* Signer node connection states */
    .signer-status-disconnected { display:block; padding:2px 14px 6px; font-size:11px; color:#7c86a7; }
    .signer-status-connecting { display:block; padding:2px 14px 6px; font-size:11px; color:#62d0ff; }
    .signer-status-connected { display:flex; flex-wrap:wrap; align-items:center; gap:6px; padding:2px 14px 6px; font-size:11px; }
    .signer-status-error { display:block; padding:2px 14px 4px; font-size:10px; color:#ff3b3b; }
    .signer-method-badge { background:rgba(57,255,20,0.12); border:1px solid rgba(57,255,20,0.3); border-radius:4px; padding:1px 6px; font-size:10px; color:#39ff14; letter-spacing:0.08em; }
    .signer-pubkey { font-size:10px; color:#62d0ff; font-family:inherit; }
    .signer-relay { font-size:10px; color:#a5abc2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px; }
    .signer-connect-btn { margin:6px 14px 12px; padding:8px 14px; background:rgba(57,255,20,0.08); border:1px solid rgba(57,255,20,0.3); border-radius:8px; color:#39ff14; cursor:pointer; font-family:inherit; font-size:11px; font-weight:500; transition:all 0.15s; display:block; width:calc(100% - 28px); }
    .signer-connect-btn:hover { background:rgba(57,255,20,0.18); border-color:#39ff14; }
    .signer-disconnect-btn { margin:4px 14px 10px; padding:4px 10px; background:transparent; border:1px solid #3a3a4a; border-radius:6px; color:#7c86a7; cursor:pointer; font-family:inherit; font-size:10px; transition:all 0.15s; display:block; }
    .signer-disconnect-btn:hover { border-color:rgba(255,59,59,0.4); color:#ff3b3b; }
    /* Signer activity feed */
    .signer-recent-requests { padding:6px 14px 8px; border-top:1px solid #1f2235; }
    .signer-recent-label { font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:#7c86a7; margin-bottom:4px; }
    .signer-request-row { display:flex; gap:6px; align-items:center; font-size:10px; padding:2px 0; }
    .signer-request-row.ok .signer-req-status { color:#39ff14; }
    .signer-request-row.err .signer-req-status { color:#ff3b3b; }
    .signer-req-method { color:#a5abc2; }
    .signer-req-kind { color:#62d0ff; }
    .signer-no-requests { font-size:10px; color:#3a3a4a; }
    /* ─── Signer connect modal ──────────────────────────────── */
    .signer-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; }
    .signer-modal-overlay[aria-hidden="false"] { display:flex; }
    .signer-modal-panel { background:#12121a; border:2px solid #3a3a4a; border-radius:16px; padding:28px; width:min(90vw,720px); max-height:90vh; overflow-y:auto; }
    .signer-modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .signer-modal-title { font-size:16px; font-weight:600; color:#f0f6ff; letter-spacing:0.05em; }
    .signer-modal-close { background:none; border:none; color:#7c86a7; cursor:pointer; font-size:18px; padding:4px 8px; }
    .signer-modal-body { display:grid; grid-template-columns:1fr auto 1fr; gap:24px; align-items:start; }
    .signer-modal-option { display:flex; flex-direction:column; gap:12px; }
    .signer-option-kicker { font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color:#7c86a7; }
    .signer-option-title { font-size:15px; color:#f0f6ff; }
    .signer-option-copy { font-size:11px; color:#a5abc2; line-height:1.5; }
    .signer-modal-divider { display:flex; align-items:center; font-size:11px; color:#3a3a4a; padding-top:60px; }
    .signer-option-status { min-height:20px; font-size:11px; }
    .signer-option-status.error { color:#ff3b3b; }
    .signer-option-status.success { color:#39ff14; }
    .signer-option-status.connecting { color:#62d0ff; }
    .signer-field-label { font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:#7c86a7; }
    .signer-field-input { width:100%; background:#0a0a0f; border:1px solid #3a3a4a; border-radius:8px; padding:8px 12px; color:#f0f6ff; font-family:inherit; font-size:12px; box-sizing:border-box; }
    .signer-field-input:focus { outline:none; border-color:#62d0ff; }
    .signer-connect-action-btn { padding:10px 18px; background:rgba(57,255,20,0.1); border:1px solid rgba(57,255,20,0.4); border-radius:8px; color:#39ff14; cursor:pointer; font-family:inherit; font-size:12px; font-weight:500; transition:all 0.15s; }
    .signer-connect-action-btn:hover { background:rgba(57,255,20,0.2); border-color:#39ff14; }
    .signer-connect-action-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .signer-qr-section { display:flex; flex-direction:column; gap:8px; }
    .signer-qr-label { font-size:10px; color:#7c86a7; }
    .signer-qr-container { background:#fff; border-radius:8px; padding:8px; width:fit-content; }
    .signer-qr-relay-note { font-size:10px; color:#7c86a7; }
    .signer-qr-fallback { font-size:9px; color:#7c86a7; word-break:break-all; max-width:160px; }
    @media (max-width:640px) { .signer-modal-body { grid-template-columns:1fr; } .signer-modal-divider { padding-top:0; } }
    /* ─── Notification toast layer ─────────────────────────────── */
    #notification-toast-layer {
      position: fixed; bottom: 52vh; right: 16px; z-index: 9999;
      display: flex; flex-direction: column-reverse; gap: 8px;
      pointer-events: none;
    }
    .notif-toast {
      background: linear-gradient(135deg, rgba(18,18,30,0.97), rgba(10,10,20,0.99));
      border: 1px solid rgba(57,255,20,0.35); border-radius: 10px;
      padding: 10px 14px; max-width: 280px; pointer-events: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 12px rgba(57,255,20,0.12);
      animation: toast-in 0.22s ease-out;
    }
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(24px) scale(0.96); }
      to   { opacity: 1; transform: translateX(0)  scale(1); }
    }
    .notif-toast-title { font-size: 11px; font-weight: 600; color: #f0f6ff; margin-bottom: 3px; }
    .notif-toast-body  { font-size: 10px; color: #a5abc2; }
    .notif-toast-cue   { font-size: 9px; color: #39ff14; letter-spacing: 0.12em; margin-top: 5px; text-transform: uppercase; }
    /* ─── Notification service node controls ────────────────────── */
    .notif-node-controls { display: flex; flex-direction: column; gap: 4px; padding: 8px 14px 10px; border-top: 1px solid #1f2235; }
    .notif-node-btn {
      padding: 5px 10px; background: transparent; border: 1px solid #2a2a3a;
      border-radius: 6px; color: #a5abc2; cursor: pointer;
      font-family: inherit; font-size: 10px; text-align: left; transition: all 0.15s;
    }
    .notif-node-btn:hover { border-color: rgba(57,255,20,0.4); color: #39ff14; }
    .notif-node-btn.primary { border-color: rgba(57,255,20,0.3); color: #39ff14; background: rgba(57,255,20,0.06); }
    .notif-node-btn.primary:hover { background: rgba(57,255,20,0.14); }
    /* ─── Notification inspector panel ─────────────────────────── */
    #notification-inspector {
      display: none; flex-direction: column; gap: 0;
      padding: 12px 0 0; background: inherit; overflow: hidden;
    }
    #notification-inspector.open { display: flex; }
    .notif-inspector-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 14px 10px; border-bottom: 1px solid #1f2235;
    }
    .notif-inspector-title { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #7981a0; }
    .notif-inspector-close { background: none; border: none; color: #666; cursor: pointer; font-size: 14px; padding: 0 2px; }
    .notif-inspector-close:hover { color: #a5abc2; }
    #notification-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .notif-list-empty { padding: 12px 14px; font-size: 11px; color: #3a3a4a; }
    .notif-item { padding: 8px 14px; border-bottom: 1px solid #1a1a28; }
    .notif-item.read { opacity: 0.55; }
    .notif-item-title { font-size: 11px; color: #f0f6ff; margin-bottom: 2px; }
    .notif-item-body  { font-size: 10px; color: #a5abc2; margin-bottom: 4px; }
    .notif-item-meta  { font-size: 9px; color: #666; display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 5px; }
    .notif-item-tag   { color: #39ff14; }
    .notif-item-actions { display: flex; gap: 4px; }
    .notif-item-btn {
      padding: 2px 8px; background: transparent; border: 1px solid #2a2a3a;
      border-radius: 4px; color: #a5abc2; cursor: pointer;
      font-family: inherit; font-size: 9px; transition: all 0.15s;
    }
    .notif-item-btn.read-btn:hover { border-color: rgba(57,255,20,0.4); color: #39ff14; }
    .notif-item-btn.dismiss-btn:hover { border-color: rgba(255,59,59,0.4); color: #ff3b3b; }
    @media (max-width: 768px) {
      .topology-layout { gap: 10px; }
      .topology-core-card { width: 100%; }
      .topology-napplet-grid { grid-template-columns: 1fr; }
      .topology-service-grid { flex-direction: column; align-items: stretch; }
      .topology-service-branch { min-width: 0; }
      .topology-service-card { max-width: none; }
      #flow-area-inner.inspector-open #inspector-pane { width: 220px; }
    }
  </style>
</head>
<body class="bg-surface-dark text-gray-300 font-mono min-h-screen flex flex-col overflow-hidden">
  <header class="px-4 py-2 bg-surface-mid border-b border-surface-border flex items-center shrink-0">
    <h1 class="text-neon-blue text-sm font-bold tracking-wider uppercase">napplet playground</h1>
  </header>

  <section
    id="flow-area"
    class="flex-1 min-h-0 overflow-hidden"
    data-topology-required-nodes="topology-node-acl topology-node-runtime"
    data-topology-regions="topology-services"
  >
    <div id="flow-area-inner">
      <div id="topology-pane" class="p-4"></div>
      <div id="inspector-pane" class="node-inspector" aria-label="Node inspector"></div>
    </div>
  </section>

  <div id="resize-handle" style="height:6px;cursor:ns-resize;background:#2a2a3a;border-top:1px solid #3a3a4a;border-bottom:1px solid #3a3a4a;flex-shrink:0"></div>
  <!-- Signer connect modal -->
  <div id="signer-connect-modal" class="signer-modal-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="signer-modal-title">
    <div class="signer-modal-panel">
      <div class="signer-modal-header">
        <span id="signer-modal-title" class="signer-modal-title">Connect Signer</span>
        <button class="signer-modal-close" data-action="close-signer-modal" aria-label="Close">✕</button>
      </div>

      <div class="signer-modal-body">
        <!-- NIP-07 Column -->
        <div class="signer-modal-option" id="nip07-option">
          <div class="signer-option-kicker">extension</div>
          <div class="signer-option-title">Browser Signer</div>
          <div class="signer-option-copy">Connect a NIP-07 browser extension (e.g., Alby, nos2x, Nostrmo)</div>
          <div id="nip07-status" class="signer-option-status"></div>
          <button id="nip07-connect-btn" class="signer-connect-action-btn" data-action="connect-nip07">
            Connect Extension
          </button>
        </div>

        <div class="signer-modal-divider" aria-hidden="true">or</div>

        <!-- NIP-46 Column -->
        <div class="signer-modal-option" id="nip46-option">
          <div class="signer-option-kicker">bunker</div>
          <div class="signer-option-title">Nostr Connect</div>
          <div class="signer-option-copy">Connect a remote signing bunker via NIP-46 (nsec.app, Nostrudel)</div>

          <label class="signer-field-label" for="nip46-relay-input">Relay</label>
          <input
            id="nip46-relay-input"
            class="signer-field-input"
            type="text"
            placeholder="wss://relay.nsec.app"
            value="wss://relay.nsec.app"
          />

          <label class="signer-field-label" for="nip46-bunker-uri-input">Bunker URI</label>
          <input
            id="nip46-bunker-uri-input"
            class="signer-field-input"
            type="text"
            placeholder="bunker://..."
          />

          <div class="signer-qr-section">
            <div class="signer-qr-label">Or scan with your bunker app:</div>
            <div id="nip46-qr-container" class="signer-qr-container"></div>
            <div id="nip46-qr-relay-note" class="signer-qr-relay-note"></div>
          </div>

          <div id="nip46-status" class="signer-option-status"></div>
          <button id="nip46-connect-btn" class="signer-connect-action-btn" data-action="connect-nip46">
            Connect Bunker
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Notification toast layer: renders toasts above the debugger section -->
  <div id="notification-toast-layer" aria-live="polite" aria-label="Notification toasts"></div>

  <!-- Notification node controls: injected into the topology notifications service node -->
  <template id="notification-node-controls-template">
    <div id="notification-node" class="notif-node-controls">
      <div class="notif-node-summary" id="notification-node-summary">
        <span class="node-summary-field"><span class="node-summary-label">total:</span> <span class="node-summary-value" id="notif-total">0</span></span>
        <span class="node-summary-field"><span class="node-summary-label">unread:</span> <span class="node-summary-value" id="notif-unread">0</span></span>
        <span class="node-summary-field notif-source-cue" id="notif-source-cue" style="display:none"><span class="node-summary-label">via:</span> <span class="node-summary-value notif-cue-text"></span></span>
      </div>
      <button id="notification-node-create" class="notif-node-btn primary">+ create demo toast</button>
      <button id="notification-node-list"   class="notif-node-btn">list state</button>
      <button id="notification-node-mark-read"  class="notif-node-btn">mark latest read</button>
      <button id="notification-node-dismiss" class="notif-node-btn">dismiss latest</button>
    </div>
  </template>

  <!-- Notification inspector panel: shown inside the right inspector pane -->
  <div id="notification-inspector" aria-label="Notification inspector">
    <div class="notif-inspector-header">
      <span class="notif-inspector-title">notifications</span>
      <button class="notif-inspector-close" id="notification-inspector-close" aria-label="Close notification inspector">×</button>
    </div>
    <div id="notification-list" aria-label="Notification list">
      <div class="notif-list-empty">no notifications yet</div>
    </div>
  </div>

  <section id="debugger-section" style="height:45vh;min-height:120px" class="shrink-0 flex flex-col overflow-hidden">
    <napplet-debugger id="debugger"></napplet-debugger>
  </section>
  <script>
    (function() {
      const handle = document.getElementById('resize-handle');
      const section = document.getElementById('debugger-section');
      let dragging = false, startY = 0, startH = 0;
      handle.addEventListener('mousedown', (e) => {
        dragging = true; startY = e.clientY; startH = section.offsetHeight;
        document.body.style.cursor = 'ns-resize'; document.body.style.userSelect = 'none';
      });
      document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const delta = startY - e.clientY;
        section.style.height = Math.max(120, startH + delta) + 'px';
      });
      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false; document.body.style.cursor = ''; document.body.style.userSelect = '';
      });
    })();
  </script>

  <!-- Load leader-line UMD before main app (creates window.LeaderLine) -->
  <script src="/node_modules/leader-line/leader-line.min.js"></script>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
